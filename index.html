<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    overflow:hidden; /* 🚫 removes blank pages */
    font-family:'Poppins',sans-serif;
}

/* ================= HOME PAGE ================= */
#home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    position:relative;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

#home > *{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:60px;
    color:white;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:85px;
    margin-top:20px;
    display:flex;
    align-items:center;
    gap:20px;
    justify-content:center;
    color:white;
}

.ring{
    width:85px;
    filter:drop-shadow(0 0 10px rgba(255,255,255,0.6));
    animation:float 3s infinite ease-in-out;
}

/* BUTTON */
.btn{
    margin-top:40px;
    padding:16px 45px;
    font-size:20px;
    border:none;
    border-radius:35px;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-weight:700;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* ================= INVITE PAGE ================= */
.invite{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;

    background:url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

.invite::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

.invite > *{
    position:relative;
    z-index:2;
}

.invite h2{
    font-family:'Great Vibes',cursive;
    font-size:70px;
}

/* small details */
.invite p{
    font-size:22px;
    margin-top:10px;
}

/* animation */
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        Sandaru
        <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
        Kaveesha
    </div>

    <button class="btn" onclick="openInvite()">
        OPEN INVITATION
    </button>
</div>

<!-- ================= INVITE PAGE ================= -->
<div class="invite" id="invite">
    <h2>Sandaru & Kaveesha</h2>
    <p>05 November 2026</p>
    <p>11:00 AM</p>

    <!-- ඔයාට ඕන details මෙතන add කරන්න -->
</div>

<script>
function openInvite(){
    document.getElementById("home").style.display = "none";
    document.getElementById("invite").style.display = "flex";
}
</script>

</body>
</html>
