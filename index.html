<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    height:100%;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* HOME */
#home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

#home > *{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:65px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:90px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;

    background:linear-gradient(45deg,#fff,#ffd6e0,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.ring{
    width:80px;
    transform:translateY(10px);
    filter:drop-shadow(0 0 10px rgba(255,255,255,0.6));
}

/* BUTTON */
.btn{
    margin-top:40px;
    padding:18px 50px;
    font-size:20px;
    border:none;
    border-radius:35px;

    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-weight:700;
    cursor:pointer;

    animation:pulse 2s infinite;
}

.btn::after{
    content:"👆 Tap here";
    display:block;
    font-size:14px;
    margin-top:8px;
    color:white;
    opacity:0.8;
}

/* INVITE */
.invite{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;

    background:url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;

    visibility:hidden;
    opacity:0;

    transform:perspective(1500px) rotateY(-90deg) scale(0.9);
    transform-origin:left center;
    transition:1.2s ease;
}

.invite.active{
    visibility:visible;
    opacity:1;
    transform:perspective(1500px) rotateY(0deg) scale(1);
}

/* SECTIONS */
.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#111;
    color:white;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

.section.show{
    opacity:1;
    transform:translateY(0);
}

/* ANIMATION */
@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4);}
    70%{box-shadow:0 0 0 20px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}
</style>
</head>

<body>

<div id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        Sandaru
        <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
        Kaveesha
    </div>

    <button class="btn" onclick="openInvite()">
        OPEN INVITATION
    </button>
</div>

<div class="invite" id="invite">
    <h2>Sandaru & Kaveesha</h2>
    <p>05 November 2026</p>
    <p>11.00 AM</p>
</div>

<section class="section">
    <h2>Wedding Details</h2>
</section>

<section class="section">
    <h2>Venue</h2>
</section>

<script>
function openInvite(){
    const home = document.getElementById("home");
    const invite = document.getElementById("invite");

    home.style.display="none";
    invite.classList.add("active");
}

const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        if(sec.getBoundingClientRect().top < window.innerHeight - 100){
            sec.classList.add("show");
        }
    });
});
</script>

</body>
</html>
