<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    overflow:hidden;
}

/* ================= SECTION SYSTEM ================= */
section{
    display:none;
    height:100vh;
    width:100%;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

section.active{
    display:flex;
}

/* ================= HOME ================= */
#home{
    flex-direction:column;
    color:white;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

#home > div{
    position:relative;
    z-index:2;
    animation: fadeIn 1.5s ease;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:80px;
    color:#fff;
    letter-spacing:2px;

    position:relative;
    top:-80px; /* 🔥 උඩට යනවා (positive දුන්නොත් පහලට) */
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:110px;
    color:#C9A24E;

    text-shadow:
        0 0 10px rgba(201,162,78,0.8),
        0 0 25px rgba(201,162,78,0.5);

    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;

    position:relative;
    top:10px; /* 🔥 පහලට දාන්න */
}

.ring{
    width:110px;
    animation: float 3s infinite ease-in-out;

    position:relative;
    top:5px; /* 🔥 little adjustment */
}

/* BUTTON */
.btn{
    margin-top:50px;
    padding:16px 45px;
    font-size:26px;
    border:none;
    border-radius:40px;

    background:linear-gradient(135deg,#C9A24E,#8C6B2F);
    color:white;

    font-family:'Cinzel',serif;
    letter-spacing:3px;

    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);

    animation:pulse 2s infinite;

    position:relative;
    top:100px; /* 🔥 button down */
}

.btn::after{
    content:"👆 CLICK TO BEGIN";
    position:absolute;
    margin-top:60px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#fff;
    letter-spacing:3px;
    opacity:0.7;
}

/* ================= INVITE ================= */
#invite{
    flex-direction:column;
    overflow:hidden;
}

#invite video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

#invite::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:1;
}

.invite-content{
    position:relative;
    z-index:2;
    animation: luxuryReveal 1.5s ease;
}

/* LUXURY TEXT */
.lux-title{
    font-family:'Cinzel',serif;
    font-size:40px;
    color:#fff;
    letter-spacing:10px;
    text-transform:uppercase;
    opacity:0.9;

    position:relative;
    top:-150px !important; /* 🔥 correct */
}

.lux-names{
    font-family:'Cinzel',serif;
    font-size:75px;
    color:#C9A24E;
    letter-spacing:4px;
    text-shadow:
        0 0 10px rgba(201,162,78,0.8),
        0 0 25px rgba(201,162,78,0.4);

    margin-top:20px;

    position:relative;
    top:0; /* 🔥 move up/down here */
}

.lux-divider{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    margin:30px 0;
}

.lux-divider::before,
.lux-divider::after{
    content:"";
    flex:1;
    height:2px;
    background:linear-gradient(to right, transparent, #CFB53B);
    box-shadow:0 0 10px rgba(207,181,59,0.6);
}

.lux-divider::after{
    background:linear-gradient(to left, transparent, #CFB53B);
}

.lux-divider span{
    padding:0 18px;
    font-size:20px;
    color:#CFB53B;
    text-shadow:
        0 0 8px rgba(207,181,59,0.8),
        0 0 20px rgba(207,181,59,0.4);
    display:flex;
    align-items:center;
    gap:8px;
}

..lux-date{
    font-family:'Playfair Display',serif;
    font-size:48px;
    color:#fff;
    letter-spacing:2px;

    margin-top:40px;
    position:relative;
    top:0;
}

.lux-rsvp{
    font-size:34px;
    color:#C9A24E;
    font-family:'Cinzel',serif;
    animation: floatText 2s infinite ease-in-out;

    margin-top:40px;
    text-align:center;
}

/* BUTTON */
.lux-scroll-btn{
    margin:100px auto 0 auto; /* center + down */

    padding:14px 35px;
    border:none;
    border-radius:40px;

    background:linear-gradient(135deg,#C9A24E,#8C6B2F);
    color:#fff;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.lux-arrow{
    font-size:24px;
    color:#CFB53B;

    text-shadow:
        0 0 10px rgba(207,181,59,0.9),
        0 0 25px rgba(207,181,59,0.6);

    animation:bounceArrow 1.2s infinite ease-in-out;
}

@keyframes bounceArrow{
    0%   { transform:translateY(0); opacity:0.6; }
    50%  { transform:translateY(5px); opacity:1; }
    100% { transform:translateY(0); opacity:0.6; }
}

@keyframes bounceArrow{
    0%   { transform:translateY(0); opacity:0.6; }
    50%  { transform:translateY(5px); opacity:1; }
    100% { transform:translateY(0); opacity:0.6; }
}

/* ================= NEXT ================= */
#nextPage{
    flex-direction:column;
    background:radial-gradient(circle,#111,#000);
    color:#C9A24E;
    font-family:'Cinzel',serif;
    font-size:45px;
    letter-spacing:3px;
}

/* ================= TRANSITION ================= */
#transition{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#000,#111);
    opacity:0;
    pointer-events:none;
    transition:0.6s ease;
    z-index:9999;
}

#transition.active{
    opacity:1;
}

/* ================= ANIMATIONS ================= */
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(201,162,78,0.5);}
    70%{box-shadow:0 0 0 20px rgba(201,162,78,0);}
    100%{box-shadow:0 0 0 0 rgba(201,162,78,0);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes luxuryReveal{
    0%{opacity:0; transform:scale(1.1); filter:blur(10px);}
    100%{opacity:1; transform:scale(1); filter:blur(0);}
}

@keyframes floatText{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(6px);}
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="active">
    <div>
        <h1>The Wedding of</h1>

        <div class="names">
            Sandaru
            <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
            Kaveesha
        </div>

        <button class="btn" onclick="openInvite()">
            OPEN INVITATION
        </button>
    </div>
</section>

<!-- INVITE -->
<section id="invite">
    <video id="weddingVideo" autoplay muted loop>
        <source src="From Klickpin.com- Colorful Lip Combo Ideas for a Cozy Vibe-pin-id-1034139133211775751.mp4">
    </video>

    <div class="invite-content">
        <div class="lux-title">We are getting married</div>

        <div class="lux-names">Sandaru & Kaveesha</div>

        <div class="lux-divider">
    <span>❤</span>
</div>

        <div class="lux-date">05 November 2026</div>

        <div class="lux-rsvp">Confirm Attendance</div>

        <button class="lux-scroll-btn" onclick="scrollToNext()">
    Scroll Down
    <span class="lux-arrow">⌄</span>
</button>
</section>

<!-- NEXT -->
<section id="nextPage">
    RSVP Coming Soon
</section>

<div id="transition"></div>

<script>
function switchPage(id){
    document.querySelectorAll("section").forEach(s=>{
        s.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}

function openInvite(){
    const transition = document.getElementById("transition");
    const vid = document.getElementById("weddingVideo");

    transition.classList.add("active");

    setTimeout(()=>{
        switchPage("invite");
        vid.play();

        setTimeout(()=>{
            transition.classList.remove("active");
        },500);
    },600);
}

function scrollToNext(){
    switchPage("nextPage");
}
</script>

</body>
</html>
