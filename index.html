<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
body{
    margin:0;
    padding:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

/* Tap box */
.box{
    width:220px;
    height:120px;
    border:2px solid gold;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:white;
    font-size:18px;
    animation: glow 2s infinite;
}

@keyframes glow{
    0%{box-shadow:0 0 5px gold;}
    50%{box-shadow:0 0 20px gold;}
    100%{box-shadow:0 0 5px gold;}
}

/* Video page */
#videoPage{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

video{
    width:90%;
    max-width:400px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(255,255,255,0.3);
}
</style>

</head>
<body>

<!-- FIRST PAGE -->
<div class="box" onclick="openInvite()">
    Tap to Open Invitation
</div>

<!-- SECOND PAGE -->
<div id="videoPage">
    <video autoplay muted loop controls>
        <source src="From Klickpin.com- Colorful Lip Combo Ideas for a Cozy Vibe-pin-id-1034139133211775751.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
</div>

<script>
function openInvite(){
    document.querySelector(".box").style.display="none";
    document.getElementById("videoPage").style.display="flex";
}
</script>

</body>
</html>
