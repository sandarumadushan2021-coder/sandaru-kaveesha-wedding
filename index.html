<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body, html{
    height:100%;
    font-family: 'Poppins', sans-serif;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1200&q=80') center/cover;
    filter: brightness(30%);
}

/* HOME SCREEN */
.container{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    animation: fadeIn 2s ease-in-out;
}

h1{
    font-family:'Playfair Display', serif;
    font-size:90px;
    letter-spacing:2px;
    animation: slideDown 2s ease;
}

/* NAMES */
.names{
    font-family: 'Great Vibes', cursive;
    font-size: 120px;
    margin-top: 15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.ring{
    width:95px;
    height:95px;
    filter: drop-shadow(0 0 8px rgba(245,197,66,0.8));
}

/* BUTTON */
.btn{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff9a9e,#fad0c4);
    color:black;
    font-size:30px;
    cursor:pointer;
    transition:0.3s;
    animation: pulse 2s infinite;
}

/* INVITATION SCREEN */
.invite{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}


/* ANIMATED CONTENT */
.invite-names{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    opacity:0;
    transform:translateY(30px);
}

.invite-text{
    font-family:'Playfair Display', serif;
    font-size:28px;
    margin-top:20px;
    opacity:0;
    transform:translateY(30px);
}

.invite.active .invite-names{
    animation: fadeUp 1s ease forwards;
}

.invite.active .invite-text{
    animation: fadeUp 1s ease forwards;
    animation-delay: 1s;
}

/* ANIMATIONS */
@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes slideDown{
    from{transform:translateY(-50px);opacity:0}
    to{transform:translateY(0);opacity:1}
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4);}
    70%{box-shadow:0 0 0 20px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}
.invite{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1200&q=80') center/cover;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.invite::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.65);
}

.invite-names,
.invite-text{
    position:relative;
    z-index:2;
}
.invite.active .invite-names{
    animation: fadeUp 1s ease forwards;
}

.invite.active .invite-text{
    animation: fadeUp 1s ease forwards;
    animation-delay:1s;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HOME -->
<div class="container" id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        <div>
            Sandaru
            <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
            Kaveesha
        </div>

        <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
    </div>
</div>

<!-- INVITATION -->

    <div class="invite-names">
        Sandaru <br>&<br> Kaveesha
    </div>

    <div class="invite" id="invite">

    <div class="invite-names">
        Sandaru <br>&<br> Kaveesha
    </div>

    <div class="invite-text">
        Together with their families,<br><br>

        Request the pleasure of your company
        at the celebration of their marriage.<br><br>

        Date: 2027 January 15<br>
        Time: 10.00 AM<br>
        Venue: Hotel Name
    </div>

</div>

<script>
function openInvite(){
    document.getElementById('home').style.display='none';
    const invite = document.getElementById('invite');
    invite.style.display='flex';

    setTimeout(()=>{
        invite.classList.add('active');
    },100);
}
</script>

</body>
</html>
