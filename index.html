```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandaru & Kaveesha Wedding</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Georgia,serif;
    background:#fffaf0;
    color:#333;
    text-align:center;
}

/* INVITATION CONTENT */
#content{
    display:none;
}

/* HERO */
.hero{
    padding:80px 20px;
    background:linear-gradient(to bottom,#fff8dc,#fffaf0);
}

h1{
    font-size:3rem;
    color:#d4af37;
}

h2{
    color:#d4af37;
    margin-bottom:15px;
}

.section{
    padding:50px 20px;
}

/* COUNTDOWN */
.countdown{
    font-size:2rem;
    margin:30px auto;
    font-weight:bold;
    color:#d4af37;
    background:#fff;
    padding:20px;
    border-radius:20px;
    border:2px solid #f1d27a;
    box-shadow:0 0 20px rgba(212,175,55,0.25);
    display:inline-block;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:15px 30px;
    margin:10px;
    background:#d4af37;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-size:18px;
}

/* PHOTOS */
.photo{
    width:250px;
    height:250px;
    border-radius:50%;
    object-fit:cover;
    margin:15px;
    border:5px solid #f1d27a;
}

/* OPENING SCREEN */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom,#fff8dc,#fffaf0);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.envelope{
    width:300px;
    height:220px;
    background:white;
    border-radius:20px;
    border:2px solid #f1d27a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px rgba(212,175,55,0.35);
}

.icon{
    font-size:50px;
    background:#d4af37;
    width:90px;
    height:90px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

.envelope p{
    margin-top:20px;
    color:#666;
    font-size:18px;
}
</style>
</head>

<body>

<!-- OPENING ENVELOPE -->
<div id="overlay" class="overlay">
    <div class="envelope">
        <div class="icon" onclick="openInvitation()">💍</div>
        <p>Tap the Ring to Open Invitation</p>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="content">

<section class="hero">
    <h1>Sandaru ❤️ Kaveesha</h1>
    <p>We are getting married</p>

    <div id="countdown" class="countdown"></div>
</section>

<section class="section">
    <img class="photo" src="SAVE_20260322_144012.jpg">
    <img class="photo" src="SAVE_20260322_163358.jpg">
</section>

<section class="section">
    <h2>Wedding Ceremony</h2>
    <p>05 November 2026</p>
    <p>11:00 AM</p>
    <p>Royal Dream Palace</p>

    <a class="btn"
       href="https://maps.app.goo.gl/s2BS64UK8cj58Ukt8"
       target="_blank">
       View Location
    </a>
</section>

<section class="section">
    <h2>Going Away Reception</h2>
    <p>04:00 PM</p>
</section>

<section class="section">
    <h2>RSVP</h2>

    <a class="btn"
       href="https://wa.me/94752452479"
       target="_blank">
       Confirm Attendance
    </a>
</section>

</div>

<script>

// OPEN INVITATION
function openInvitation(){
    document.getElementById("overlay").style.display="none";
    document.getElementById("content").style.display="block";
}

// COUNTDOWN
const weddingDate =
new Date("2026-11-05T11:00:00+05:30").getTime();

setInterval(function(){

    const now = new Date().getTime();
    const distance = weddingDate - now;

    if(distance < 0){
        document.getElementById("countdown").innerHTML =
        "💍 Today is the Day!";
        return;
    }

    const days =
    Math.floor(distance/(1000*60*60*24));

    const hours =
    Math.floor((distance%(1000*60*60*24))
    /(1000*60*60));

    const minutes =
    Math.floor((distance%(1000*60*60))
    /(1000*60));

    const seconds =
    Math.floor((distance%(1000*60))
    /1000);

    document.getElementById("countdown").innerHTML =
    `
    <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">
        <div>
            <h2>${days}</h2>
            <p>Days</p>
        </div>
        <div>
            <h2>${hours}</h2>
            <p>Hours</p>
        </div>
        <div>
            <h2>${minutes}</h2>
            <p>Minutes</p>
        </div>
        <div>
            <h2>${seconds}</h2>
            <p>Seconds</p>
        </div>
    </div>
    `;
},1000);

</script>

</body>
</html>
```
