<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body, html{
    height:100%;
    font-family: 'Poppins', sans-serif;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1200&q=80') center/cover;
    filter: brightness(40%);
}

/* CENTER SCREEN */
.container{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    animation: fadeIn 2s ease-in-out;
}

/* TITLE */
h1{
    font-family:'Playfair Display', serif;
    font-size:40px;
    letter-spacing:2px;
    animation: slideDown 2s ease;
}

/* NAMES */
.names{
    font-family: 'Great Vibes', cursive;
    font-size:55px;
    margin-top:15px;
    letter-spacing:2px;
    opacity:0.95;
    text-shadow:0 0 10px rgba(255,255,255,0.6);
    animation: fadeIn 3s ease;
}

/* GOLD RING */
.ring{
    display:inline-block;
    width:28px;
    height:28px;
    margin:0 15px;
    border-radius:50%;
    position:relative;

    background: radial-gradient(circle at 30% 30%, #fff6c2, #f5c542, #c8921b);
    box-shadow:
        0 0 10px rgba(245, 197, 66, 0.8),
        inset 0 0 6px rgba(255,255,255,0.6);

    animation: pulse 2s infinite;
}

/* ring shine */
.ring::after{
    content:"";
    position:absolute;
    top:3px;
    left:5px;
    width:8px;
    height:8px;
    background:rgba(255,255,255,0.8);
    border-radius:50%;
    filter:blur(1px);
}
    .ring{
    width: 45px;
    height: 45px;
    margin: 0 15px;
    vertical-align: middle;
    animation: pulse 2s infinite;
    filter: drop-shadow(0 0 8px rgba(245,197,66,0.8));
}

/* BUTTON */
.btn{
    margin-top:40px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff9a9e,#fad0c4);
    color:black;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    animation: pulse 2s infinite;
}

.btn:hover{
    transform:scale(1.1);
}

/* INVITATION PAGE */
.invite{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:#111;
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    animation: zoomIn 1s ease;
}

/* TEXT */
.invite h2{
    font-size:35px;
    font-family:'Playfair Display', serif;
}

.invite p{
    margin-top:10px;
    opacity:0.8;
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes slideDown{
    from{transform:translateY(-50px);opacity:0}
    to{transform:translateY(0);opacity:1}
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4);}
    70%{box-shadow:0 0 0 20px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}

@keyframes zoomIn{
    from{transform:scale(0.7);opacity:0}
    to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HOME SCREEN -->
<div class="container" id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        Sandaru <img class="ring" src="https://cdn-icons-png.flaticon.com/512/2589/2589175.png" alt="ring"> Kaveesha
    <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
</div>

<!-- INVITATION SCREEN -->
<div class="invite" id="invite">
    <h2>You are Invited 💍</h2>
    <p>Welcome to our special day</p>
</div>

<script>
function openInvite(){
    document.getElementById('home').style.display='none';
    document.getElementById('invite').style.display='flex';
}
</script>

</body>
</html>
