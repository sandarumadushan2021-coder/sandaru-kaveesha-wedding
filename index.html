<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandaru ❤️ Kaveesha Wedding</title>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.10.8/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  font-family:Georgia,serif;
  background:#0a0a0f;
  color:white;
  overflow-x:hidden;
}

/* LOADING SCREEN */
#loader{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  flex-direction:column;
}

.spinner{
  width:60px;
  height:60px;
  border:5px solid #333;
  border-top:5px solid gold;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* ENVELOPE */
#startScreen{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#1a1a1a,#000);
  z-index:9999;
}

.envelope{
  width:260px;
  height:180px;
  position:relative;
  cursor:pointer;
  perspective:1000px;
}

.flap{
  position:absolute;
  width:100%;
  height:50%;
  background:gold;
  transform-origin:top;
  transition:0.8s;
  border-radius:10px 10px 0 0;
}

.front{
  width:100%;
  height:100%;
  background:white;
  border-radius:10px;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

.icon{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:45px;
}

/* MAIN SITE */
#mainSite{
  display:none;
}

/* GLASS UI */
.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:15px;
  margin:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
}

/* HERO */
.hero{
  padding:70px 20px;
  text-align:center;
}

h1{
  font-size:3rem;
  color:gold;
}

/* COUNTDOWN */
#countdown{
  font-size:1.8rem;
  color:gold;
}

/* SLIDESHOW */
.slide{
  display:none;
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:15px;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  background:gold;
  color:black;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
  display:inline-block;
  margin:10px;
}

/* RSVP */
input{
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* FIREWORKS */
#fireworks{
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* MUSIC BUTTON */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:gold;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Loading Invitation...</p>
</div>

<!-- ENVELOPE -->
<div id="startScreen">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="front"></div>
    <div class="icon">💌</div>
  </div>
</div>

<!-- FIREWORKS -->
<div id="fireworks"></div>

<!-- MAIN SITE -->
<div id="mainSite">

<div class="hero glass">
  <h1>Sandaru ❤️ Kaveesha</h1>
  <div id="countdown"></div>
</div>

<div class="glass">
  <img class="slide" src="SAVE_20260322_144012.jpg">
  <img class="slide" src="SAVE_20260322_163358.jpg">
</div>

<div class="glass">
  <h2>Wedding Ceremony</h2>
  <p>05 November 2026 - 11:00 AM</p>
</div>

<div class="glass">
  <a class="btn" href="https://maps.app.goo.gl/s2BS64UK8cj58Ukt8">View Location</a>
</div>

<!-- RSVP -->
<div class="glass">
  <h2>RSVP</h2>
  <form action="https://script.google.com/macros/s/YOUR_SCRIPT_URL/exec" method="POST">
    <input name="name" placeholder="Your Name" required>
    <input name="phone" placeholder="Phone" required>
    <button class="btn" type="submit">Send RSVP</button>
  </form>
</div>

<!-- SHARE -->
<div class="glass">
  <a class="btn" id="shareBtn">Share via WhatsApp</a>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3b6c2d0d3b.mp3">
</audio>

<div id="musicBtn">🎵</div>

<script>

// LOADER
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("startScreen").style.display="flex";
  },1500);
};

// ENVELOPE OPEN
document.getElementById("envelope").onclick = ()=>{
  document.getElementById("envelope").classList.add("open");

  setTimeout(()=>{
    document.getElementById("startScreen").style.display="none";
    document.getElementById("mainSite").style.display="block";

    startCountdown();
    startSlides();
    startFireworks();

    document.getElementById("music").play().catch(()=>{});

  },800);
};

// COUNTDOWN
function startCountdown(){
  const w = new Date("Nov 05, 2026 11:00:00").getTime();

  setInterval(()=>{
    let now = new Date().getTime();
    let d = w-now;

    document.getElementById("countdown").innerHTML =
    Math.floor(d/86400000)+" Days";
  },1000);
}

// SLIDESHOW
let i=0;
function startSlides(){
  let slides = document.getElementsByClassName("slide");

  function show(){
    for(let s of slides) s.style.display="none";
    i++;
    if(i>slides.length) i=1;
    slides[i-1].style.display="block";
    setTimeout(show,3000);
  }
  show();
}

// FIREWORKS
function startFireworks(){
  let f = new Fireworks.default(document.getElementById("fireworks"),{
    particles:80
  });
  f.start();
  setTimeout(()=>f.stop(),8000);
}

// MUSIC
document.getElementById("musicBtn").onclick = ()=>{
  let m = document.getElementById("music");
  m.paused ? m.play() : m.pause();
};

// SHARE
document.getElementById("shareBtn").onclick = ()=>{
  let url = window.location.href;
  let text = "💍 Join Our Wedding Invitation: " + url;
  window.open("https://wa.me/?text="+encodeURIComponent(text));
};

</script>

</body>
</html>
