<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    overflow-x:hidden;
}

/* SECTION */
section{
    height:100vh;
    width:100%;
}

/* ================= HOME ================= */
#home{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    position:relative;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

#home > *{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:80px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:100px;
    margin-top:20px;
    display:flex;
    gap:20px;
    align-items:center;
}

.ring{
    width:100px;
}

/* BUTTON */
.btn{
    margin-top:40px;
    padding:16px 45px;
    font-size:30px;
    border:none;
    border-radius:35px;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-weight:700;
    cursor:pointer;
}

/* ================= INVITE ================= */
#invite{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    overflow:hidden;
}

#invite video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

#invite::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:1;
}

.invite-content{
    position:relative;
    z-index:2;
}

/* LUX STYLE */
.lux-title{
    font-family:'Cinzel',serif;
    font-size:35px;
    color:white;
    margin-bottom:20px;
}

.lux-names{
    font-family:'Cinzel',serif;
    font-size:70px;
    color:#C9A24E;
}

.lux-date{
    font-size:30px;
    margin-top:20px;
}

.lux-scroll-btn{
    margin-top:40px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#C9A24E;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

/* ================= NEXT ================= */
#nextPage{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    color:#C9A24E;
    font-size:40px;
    font-family:'Cinzel',serif;
}

/* TRANSITION */
#transition{
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
    transition:0.6s;
    z-index:9999;
}

#transition.active{
    opacity:1;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home">
    <div>
        <h1>The Wedding of</h1>

        <div class="names">
            Sandaru
            <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
            Kaveesha
        </div>

        <button class="btn" onclick="openInvite()">
            OPEN INVITATION
        </button>
    </div>
</section>

<!-- INVITE -->
<section id="invite">
    <video id="weddingVideo" autoplay muted loop>
        <source src="From Klickpin.com- Colorful Lip Combo Ideas.mp4">
    </video>

    <div class="invite-content">
        <h2 class="lux-title">We are getting married</h2>

        <h1 class="lux-names">Sandaru & Kaveesha</h1>

        <p class="lux-date">05 November 2026</p>

        <button class="lux-scroll-btn" onclick="scrollToNext()">
            Scroll Down
        </button>
    </div>
</section>

<!-- NEXT -->
<section id="nextPage">
    RSVP Coming Soon
</section>

<div id="transition"></div>

<script>
function openInvite(){
    const transition = document.getElementById("transition");
    const vid = document.getElementById("weddingVideo");

    transition.classList.add("active");

    setTimeout(()=>{
        document.getElementById("invite")
        .scrollIntoView({behavior:"smooth"});

        vid.play();

        setTimeout(()=>{
            transition.classList.remove("active");
        },400);

    },600);
}

function scrollToNext(){
    document.getElementById("nextPage")
    .scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
