<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght=400;600&family=Cinzel:wght=400;600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="—Pngtree—beautiful gold wedding rings png_6499014.png">
    <style>
        *{ margin: 0; padding: 0; box-sizing: border-box; }
        html{ scroll-behavior: smooth; }
        body{ overflow-x:hidden; background-color: #000; }
        
        /* [ඔබේ පවතින සියලුම CSS මෙතැනට ඇතුළත් වේ - මම එය එලෙසම තබා ඇත] */
        .home-container h1 { font-family: 'Playfair Display', serif; font-size: 35px; color: #F5F5F2; text-align: center; }
        .home-container .names { font-family: 'Great Vibes', cursive; font-size: 37px; color: #C9A24E; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .home-container .ring { width: 36px; height: auto; animation: ringShow 0.8s ease forwards, float 3s infinite ease-in-out 0.8s; }
        
        section{ display: none; min-height: 100vh; width: 100%; justify-content: center; align-items: center; text-align: center; position: relative; padding: 20px; }
        section.active{ display: flex; }

        /* Scrollable Page Logic */
        #nextPage {
            display: none;
            flex-direction: column;
            justify-content: flex-start; /* උඩින් පටන් ගැනීමට */
            padding-top: 40px;
            background: radial-gradient(circle, #111, #000);
            color: #C9A24E;
            font-family: 'Cinzel', serif;
            overflow-y: auto; /* 👈 මෙතැනින් තමයි Scroll වෙන්නේ */
            height: 100vh;
        }

        #agendaPage {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        .lux-join-title { font-size: 34px; letter-spacing: 8px; color: #C9A24E; margin-bottom: 20px; }
        .agenda-title { color: #C9A24E; font-size: 36px; margin-bottom: 30px; }
        .agenda-item { display: flex; justify-content: space-between; padding: 15px 20px; margin-bottom: 12px; border: 1px solid rgba(201,162,78,.25); background: rgba(255,255,255,.03); border-radius: 15px; }
        
        /* ඉතිරි සියලුම CSS ඔබේ මුල් කෝඩ් එකේ තිබූ පරිදිම පවතිනු ඇත */
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <section id="home" class="active">
        <div class="home-container">
            <h1>The Wedding of</h1>
            <div class="names">
                <span class="name">Sandaru</span>
                <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png" alt="ring">
                <span class="name">Kaveesha</span>
            </div>
            <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
        </div>
    </section>

    <!-- INVITE PAGE -->
    <section id="invite">
        <div class="invite-content">
            <div class="lux-title">We are getting married</div>
            <div class="lux-names">Sandaru & Kaveesha</div>
            <button class="lux-scroll-btn" onclick="scrollToNext()">Scroll Down</button>
        </div>
    </section>

    <!-- DETAILS & AGENDA එකම section එකක -->
    <section id="nextPage">
        <div class="lux-join-title">JOIN OUR SPECIAL DAY</div>
        <!-- [ඔබේ පවතින details සහ timer මෙතැනට එයි] -->
        <div class="family-info">... (ඔබේ details මෙතැනට) ...</div>
        
        <!-- AGENDA PAGE (දැන් බොත්තමක් නැතිව කෙළින්ම යටින් දිස්වේ) -->
        <div id="agendaPage">
            <h2 class="agenda-title">Wedding Agenda</h2>
            <div class="agenda-list">
                <div class="agenda-item"><span>09:00 AM</span><span>Guest Arrival</span></div>
                <div class="agenda-item"><span>09:30 AM</span><span>Poruwa Ceremony</span></div>
            </div>
        </div>
    </section>

    <script>
        function scrollToNext(){
            document.getElementById("home").style.display = "none";
            document.getElementById("invite").style.display = "none";
            
            const next = document.getElementById("nextPage");
            next.style.display = "flex";
            next.classList.add("active");
        }
        // අමතර බොත්තම් සහ අනවශ්‍ය function ඉවත් කරන ලදී
    </script>
</body>
</html>
