<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    height:100%;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#000;
}

/* ================= HOME ================= */
#home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;
    overflow:hidden;
}

/* background image */
#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    filter:brightness(0.4);
    transform:scale(1.1);
}

/* floating particles glow */
#home::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
               radial-gradient(circle at 80% 70%, rgba(255,192,203,0.1), transparent 50%);
}

/* content layer */
#home > *{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:60px;
    animation:fadeDown 1.5s ease;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:85px;
    margin-top:20px;
    display:flex;
    align-items:center;
    gap:18px;

    background:linear-gradient(45deg,#fff,#ffb6c1,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:fadeUp 2s ease;
}

/* ring */
.ring{
    width:75px;
    filter:drop-shadow(0 0 15px rgba(255,255,255,0.6));
    animation:float 3s infinite ease-in-out;
}

/* button */
.btn{
    margin-top:40px;
    padding:16px 50px;
    font-size:18px;
    border:none;
    border-radius:40px;

    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    color:#111;
    font-weight:700;
    cursor:pointer;

    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.3s;

    animation:pulse 2s infinite;
}

.btn:hover{
    transform:scale(1.08);
}

/* tap text */
.btn::after{
    content:"👆 Tap to Open";
    position:absolute;
    bottom:-28px;
    left:50%;
    transform:translateX(-50%);
    font-size:13px;
    color:white;
    opacity:0.8;
    animation:blink 1.5s infinite;
}

/* ================= INVITE PAGE ================= */
.invite{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;

    opacity:0;
    visibility:hidden;
    transform:scale(1.2);
    transition:1s ease;

    overflow:hidden;
}

/* VIDEO BACKGROUND */
.invite video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.5);
}

/* content */
.invite-content{
    position:relative;
    z-index:2;
    animation:fadeUp 1.5s ease;
}

.invite h2{
    font-family:'Great Vibes',cursive;
    font-size:70px;
}

/* ACTIVE */
.invite.active{
    opacity:1;
    visibility:visible;
    transform:scale(1);
}

/* ================= SECTIONS ================= */
.section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0d0d0d;
    color:white;

    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

.section.show{
    opacity:1;
    transform:translateY(0);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,0.3);}
    70%{box-shadow:0 0 0 18px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}

@keyframes blink{
    0%,100%{opacity:0.5;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        Sandaru
        <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
        Kaveesha
    </div>

    <button class="btn" onclick="openInvite()">
        OPEN INVITATION
    </button>
</div>

<!-- INVITATION PAGE (WITH VIDEO) -->
<div class="invite" id="invite">

    <!-- 🔥 replace this video -->
    <video autoplay muted loop>
        <source src="YOUR_VIDEO.mp4" type="video/mp4">
    </video>

    <div class="invite-content">
        <h2>Sandaru & Kaveesha</h2>
        <p>05 November 2026</p>
        <p>11.00 AM</p>
    </div>
</div>

<!-- SECTIONS -->
<section class="section">
    <h2>Wedding Details</h2>
    <p>Welcome to our special day 💖</p>
</section>

<section class="section">
    <h2>Venue</h2>
    <p>Beautiful Location 🌿</p>
</section>

<script>

function openInvite(){
    const home = document.getElementById("home");
    const invite = document.getElementById("invite");

    home.style.opacity = "0";
    home.style.transform = "scale(0.9)";

    setTimeout(() => {
        home.style.display = "none";
        invite.classList.add("active");
    }, 700);
}

/* scroll animation */
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        if(sec.getBoundingClientRect().top < window.innerHeight - 100){
            sec.classList.add("show");
        }
    });
});

</script>

</body>
</html>
