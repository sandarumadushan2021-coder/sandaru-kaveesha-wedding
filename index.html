<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body, html{
    height:100%;
    font-family: 'Poppins', sans-serif;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1200&q=80') center/cover;
    filter: brightness(30%);
}

/* HOME SCREEN */
.container{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    animation: fadeIn 2s ease-in-out;
}

h1{
    font-family:'Playfair Display', serif;
    font-size:90px;
    letter-spacing:2px;
    animation: slideDown 2s ease;
}

/* NAMES */
.names{
    font-family: 'Great Vibes', cursive;
    font-size: 120px;
    margin-top: 15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.ring{
    width:95px;
    height:95px;
    filter: drop-shadow(0 0 8px rgba(245,197,66,0.8));
}

/* BUTTON */
.btn{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff9a9e,#fad0c4);
    color:black;
    font-size:30px;
    cursor:pointer;
    transition:0.3s;
    animation: pulse 2s infinite;
}

/* INVITATION SCREEN */
.invite{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}


/* ANIMATED CONTENT */
.invite-names{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    opacity:0;
    transform:translateY(30px);
}

.invite-text{
    font-family:'Playfair Display', serif;
    font-size:28px;
    margin-top:20px;
    opacity:0;
    transform:translateY(30px);
}

.invite.active .invite-names{
    animation: fadeUp 1s ease forwards;
}

.invite.active .invite-text{
    animation: fadeUp 1s ease forwards;
    animation-delay: 1s;
}

/* ANIMATIONS */
@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}

@keyframes slideDown{
    from{transform:translateY(-50px);opacity:0}
    to{transform:translateY(0);opacity:1}
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4);}
    70%{box-shadow:0 0 0 20px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}
    /* SECOND PAGE - Section 01 */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.heart{
    font-size:50px;
    color:#ff4f8b;
    margin-bottom:15px;
    animation:pulse 2s infinite;
}

.couple-name{
    font-size:3.2rem;
    color:#ff4f8b;
    margin:10px 0;
}

.couple-name span{
    color:#d4af37;
}

.invite-text{
    font-weight:300;
    letter-spacing:2px;
}

.welcome-text{
    max-width:500px;
    line-height:1.8;
}

.date-box{
    margin-top:20px;
    background:#ff4f8b;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HOME -->
<div class="container" id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        <div>
            Sandaru
            <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
            Kaveesha
        </div>

        <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
    </div>
</div>

<!-- INVITATION SECOND PAGE -->
<div class="hero glass">

  <div class="heart">♥</div>

  <h3 class="invite-text">
    Together with our families
  </h3>

  <h1 class="couple-name">
    Sandaru <span>&</span> Kaveesha
  </h1>

  <p class="welcome-text">
    Joyfully invite you to celebrate
    their wedding ceremony
  </p>

  <div class="date-box">
    05 November 2026
  </div>

  <a href="#countdown-section" class="btn">
    View Invitation
  </a>

</div>
    

<script>
function openInvite(){
    document.getElementById('home').style.display='none';
    const invite = document.getElementById('invite');
    invite.style.display='flex';

    setTimeout(()=>{
        invite.classList.add('active');
    },100);
}
</script>

</body>
</html>
