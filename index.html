<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    overflow-x:hidden;
    color:white;
}

/* ================= HOME ================= */
#home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* background image */
#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover;
    filter:brightness(0.35);
}

#home > *{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:55px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:85px;
    margin-top:20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.ring{
    width:70px;
    filter:drop-shadow(0 0 15px white);
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* BUTTON */
.btn{
    margin-top:40px;
    padding:16px 55px;
    border:none;
    border-radius:50px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
}

/* ================= INVITE ================= */
.invite{
    position:fixed;
    inset:0;
    opacity:0;
    visibility:hidden;
    transform:scale(1.15);
    transition:1.2s ease;
}

/* VIDEO BACKGROUND */
.invite video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.5);
}

/* CONTENT */
.invite-content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.invite h2{
    font-family:'Great Vibes',cursive;
    font-size:75px;
}

/* ACTIVE */
.invite.active{
    opacity:1;
    visibility:visible;
    transform:scale(1);
}

/* ================= SECTIONS ================= */
.section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0d0d0d;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

.section.show{
    opacity:1;
    transform:translateY(0);
}

/* CONFETTI */
canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999;
}

/* MUSIC BUTTON */
.music{
    position:fixed;
    bottom:20px;
    right:20px;
    background:white;
    color:black;
    padding:10px 15px;
    border-radius:30px;
    cursor:pointer;
    font-size:14px;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        Sandaru
        <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
        Kaveesha
    </div>

    <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
</div>

<!-- INVITE PAGE -->
<div class="invite" id="invite">

    <!-- 🔥 REPLACE THIS WITH YOUR GITHUB RAW VIDEO LINK -->
    <video autoplay muted loop>
        <source src="https://raw.githubusercontent.com/USERNAME/REPO/main/video.mp4" type="video/mp4">
    </video>

    <div class="invite-content">
        <h2>Sandaru & Kaveesha</h2>
        <p>05 November 2026</p>
        <p>11.00 AM</p>
    </div>
</div>

<!-- SECTIONS -->
<section class="section">
    <h2>Wedding Details 💖</h2>
</section>

<section class="section">
    <h2>Venue 🌿</h2>
</section>

<!-- CONFETTI -->
<canvas id="confetti"></canvas>

<!-- MUSIC -->
<div class="music" onclick="toggleMusic()">🎵 Music</div>
<audio id="music">
    <source src="MUSIC_URL_HERE">
</audio>

<script>

/* OPEN INVITE */
function openInvite(){
    document.getElementById("home").style.display="none";
    document.getElementById("invite").classList.add("active");
    startConfetti();
}

/* SCROLL EFFECT */
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll",()=>{
    sections.forEach(s=>{
        if(s.getBoundingClientRect().top < window.innerHeight-100){
            s.classList.add("show");
        }
    });
});

/* MUSIC */
function toggleMusic(){
    const music = document.getElementById("music");
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* CONFETTI */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function startConfetti(){
    for(let i=0;i<120;i++){
        pieces.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*5+2
        });
    }
    draw();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    pieces.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += 2;
        if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

</script>

</body>
</html>
