<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    height:100%;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:black;
}

/* HOME */
#home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1200&q=80') center/cover;
    filter:brightness(0.8);
}

h1{
    font-family:'Playfair Display',serif;
    font-size:60px;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:80px;
    margin-top:20px;
}

/* BUTTON */
.btn{
    margin-top:30px;
    padding:12px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff9a9e,#fad0c4);
}

/* INVITATION */
.invite{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;

    background:url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1200&q=80') center/cover;

    transform:perspective(1200px) rotateY(-90deg);
    transform-origin:left;
    opacity:0;
    transition:1.2s ease;
}

.invite.active{
    transform:perspective(1200px) rotateY(0deg);
    opacity:1;
}

.invite h2{
    font-family:'Great Vibes',cursive;
    font-size:70px;
}

/* SECTIONS */
.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#111;
    color:white;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

.section.show{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <h1>The Wedding of</h1>
    <div class="names">Sandaru ❤️ Kaveesha</div>

    <button class="btn" onclick="openInvite()">
        Open Invitation
    </button>
</div>

<!-- INVITATION -->
<div class="invite" id="invite">
    <h2>Sandaru & Kaveesha</h2>
    <p>05 November 2026</p>
    <p>11.00 AM</p>
</div>

<!-- SCROLL SECTIONS -->
<section class="section">
    <h2>Wedding Details</h2>
    <p>Welcome to our special day 💖</p>
</section>

<section class="section">
    <h2>Venue</h2>
    <p>To be announced</p>
</section>

<script>
function openInvite(){
    document.getElementById("home").style.display="none";
    const invite = document.getElementById("invite");
    invite.classList.add("active");
}

/* scroll animation */
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        if(sec.getBoundingClientRect().top < window.innerHeight - 100){
            sec.classList.add("show");
        }
    });
});
</script>

</body>
</html>
