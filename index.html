<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Cinzel', serif; overflow-x: hidden; }

        /* FIXED PAGES */
        .fixed-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s ease, opacity 0.8s ease;
            z-index: 100;
        }

        #home { z-index: 200; background: url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover; }
        #invite { z-index: 150; background: #000; }

        .hidden-up { transform: translateY(-100vh); opacity: 0; pointer-events: none; }

        /* SCROLLABLE AREA */
        #mainContent { display: none; width: 100%; }
        #mainContent.active { display: block; }
        .scroll-section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }

        /* BUTTONS */
        .btn { padding: 15px 30px; border-radius: 40px; background: #C9A24E; border: none; cursor: pointer; color: white; font-size: 16px; }
        .lux-scroll-btn { margin-top: 20px; padding: 12px 30px; border-radius: 40px; background: transparent; border: 2px solid #C9A24E; color: #C9A24E; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. HOME -->
    <section id="home" class="fixed-page">
        <h1>The Wedding of</h1>
        <br>
        <button class="btn" onclick="goToInvite()">OPEN INVITATION</button>
    </section>

    <!-- 2. INVITE (FIXED WITH SCROLL BUTTON) -->
    <section id="invite" class="fixed-page hidden-up">
        <div style="text-align: center;">
            <h1>Sandaru & Kaveesha</h1>
            <p>05 November 2026</p>
            <!-- මේ තියෙන්නේ Scroll Down button එක -->
            <button class="lux-scroll-btn" onclick="goToScrollable()">Scroll Down ⌄</button>
        </div>
    </section>

    <!-- 3. SCROLLABLE PAGES -->
    <div id="mainContent">
        <section id="nextPage" class="scroll-section" style="background: #111;">
            <h1>Join Our Special Day</h1>
            <p>Details here...</p>
        </section>

        <section id="agendaPage" class="scroll-section" style="background: #050505;">
            <h1>Wedding Agenda</h1>
            <p>Agenda events here...</p>
        </section>
        
        <!-- ඔබට තව පිටු ඕනෑනම් මෙතනින් පහළට එකතු කරන්න -->
    </div>

    <script>
        function goToInvite() {
            document.getElementById('home').classList.add('hidden-up');
            document.getElementById('invite').classList.remove('hidden-up');
        }

        function goToScrollable() {
            document.getElementById('invite').classList.add('hidden-up');
            document.getElementById('mainContent').classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
