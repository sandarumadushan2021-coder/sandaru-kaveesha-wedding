<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body, html{
height:100%;
font-family: 'Poppins', sans-serif;
overflow:hidden;
background:black;
}

/* BACKGROUND */
.bg{
position:absolute;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1200&q=80') center/cover;
filter: brightness(40%);
}

/* CENTER CONTENT */
.container{
position:relative;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
animation: fadeIn 2s ease-in-out;
}

h1{
font-family:'Playfair Display', serif;
font-size:40px;
letter-spacing:2px;
animation: slideDown 2s ease;
}

.names{
font-size:22px;
margin-top:10px;
opacity:0.9;
letter-spacing:3px;
animation: fadeIn 3s ease;
}

/* BUTTON */
.btn{
margin-top:40px;
padding:15px 40px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff9a9e,#fad0c4);
color:black;
font-size:16px;
cursor:pointer;
transition:0.3s;
animation: pulse 2s infinite;
}

.btn:hover{
transform:scale(1.1);
}

/* INVITATION PAGE */
.invite{
display:none;
position:absolute;
width:100%;
height:100%;
background:#111;
color:white;
justify-content:center;
align-items:center;
flex-direction:column;
animation: zoomIn 1s ease;
}

.invite h2{
font-size:35px;
font-family:'Playfair Display', serif;
}

.invite p{
margin-top:10px;
opacity:0.8;
}

/* ANIMATIONS */
@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideDown{
from{transform:translateY(-50px);opacity:0}
to{transform:translateY(0);opacity:1}
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4);}
70%{box-shadow:0 0 0 20px rgba(255,255,255,0);}
100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}

@keyframes zoomIn{
from{transform:scale(0.7);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- OPENING SCREEN -->
<div class="container" id="home">
    <h1>The Wedding of</h1>
    <div class="names">Sandaru & Kaveesha</div>

    <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
</div>

<!-- INVITATION SCREEN -->
<div class="invite" id="invite">
    <h2>You are Invited 💍</h2>
    <p>Click animation open page like premium wedding invite</p>
</div>

<script>
function openInvite(){
document.getElementById('home').style.display='none';
document.getElementById('invite').style.display='flex';
}
</script>

</body>
</html>
