<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body,html{
    height:100%;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* ================= HOME ================= */
#home{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;

    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

/* dark overlay */
#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

#home > *{
    position:relative;
    z-index:2;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:65px;
    animation:fadeDown 1.5s ease;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:100px;
    margin-top:20px;
    background:linear-gradient(45deg,#fff,#ffd6e0,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:fadeUp 2s ease;
}

.ring{
    width:90px;
    margin:0 15px;
    filter:drop-shadow(0 0 10px rgba(255,255,255,0.6));
    animation:float 3s infinite ease-in-out;
}

.btn{
    margin-top:40px;
    padding:14px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* ================= INVITE (3D FLIP FIX) ================= */
.invite{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;

    background:url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;

    opacity:0;
    transform:perspective(1500px) rotateY(-90deg) scale(0.8);
    transform-origin:left center;
    filter:blur(8px);

    transition:1.3s cubic-bezier(0.25, 1, 0.3, 1);
}

.invite.active{
    opacity:1;
    transform:perspective(1500px) rotateY(0deg) scale(1);
    filter:blur(0);
}

/* ================= SECTIONS ================= */
.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#111;
    color:white;
    opacity:0;
    transform:translateY(60px);
    transition:1s;
}

.section.show{
    opacity:1;
    transform:translateY(0);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeDown{
    from{opacity:0; transform:translateY(-40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <h1>The Wedding of</h1>

    <div class="names">
        Sandaru
        <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
        Kaveesha
    </div>

    <button class="btn" onclick="openInvite()">
        OPEN INVITATION
    </button>
</div>

<!-- INVITATION -->
<div class="invite" id="invite">
    <h2>Sandaru & Kaveesha</h2>
    <p>05 November 2026</p>
    <p>11.00 AM</p>
</div>

<!-- SECTIONS -->
<section class="section">
    <h2>Wedding Details</h2>
    <p>Welcome to our special day 💖</p>
</section>

<section class="section">
    <h2>Venue</h2>
    <p>Beautiful Location 🌿</p>
</section>

<script>
function openInvite(){
    const home = document.getElementById("home");
    const invite = document.getElementById("invite");

    home.style.transition = "1s ease";
    home.style.opacity = "0";
    home.style.transform = "scale(0.95)";

    setTimeout(()=>{
        home.style.display="none";
        invite.classList.add("active");
    },800);
}

/* scroll animation */
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        if(sec.getBoundingClientRect().top < window.innerHeight - 100){
            sec.classList.add("show");
        }
    });
});
</script>

</body>
</html>
