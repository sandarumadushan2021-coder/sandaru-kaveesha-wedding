<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    overflow:hidden;
}

/* ================= HOME ================= */
#home{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
    position:relative;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

#home > div{
    position:relative;
    z-index:2;
    text-align:center;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:70px;
    color:white;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:100px;
    color:#C9A24E;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
}

.ring{
    width:90px;
    animation:float 3s infinite ease-in-out;
}

.btn{
    margin-top:40px;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:40px;
    background:linear-gradient(135deg,#C9A24E,#8C6B2F);
    color:white;
    cursor:pointer;
    font-family:'Cinzel',serif;
}

/* ================= INVITE ================= */
#invite{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

#invite video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#invite::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

.invite-content{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
}

.lux-title{
    font-family:'Cinzel',serif;
    font-size:35px;
}

.lux-names{
    font-family:'Cinzel',serif;
    font-size:65px;
    color:#C9A24E;
}

.lux-date{
    font-size:40px;
    margin-top:20px;
}

.lux-scroll-btn{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:linear-gradient(135deg,#C9A24E,#8C6B2F);
    color:white;
    cursor:pointer;
}

/* ================= SLIDER ================= */
.pages{
    display:flex;
    width:200vw;
    height:100vh;
    transition:transform 0.6s ease;
}

.page{
    width:100vw;
    height:100vh;
    flex-shrink:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:radial-gradient(circle,#111,#000);
    color:#C9A24E;
}

/* ================= AGENDA ================= */
.agenda-container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.agenda-item{
    display:flex;
    justify-content:space-between;
    width:300px;
    padding:10px;
    border:1px solid #C9A24E;
}

/* ================= TIMER ================= */
.timer{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.timer div{
    padding:15px;
    border:1px solid #C9A24E;
    text-align:center;
}

/* animations */
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home">
    <div>
        <h1>The Wedding of</h1>

        <div class="names">
            Sandaru
            <img class="ring" src="—Pngtree—beautiful gold wedding rings png_6499014.png">
            Kaveesha
        </div>

        <button class="btn" onclick="openInvite()">OPEN INVITATION</button>
    </div>
</section>

<!-- INVITE -->
<section id="invite">
    <video autoplay muted loop>
        <source src="From Klickpin.com- Colorful Lip Combo Ideas.mp4">
    </video>

    <div class="invite-content">
        <div class="lux-title">We are getting married</div>
        <div class="lux-names">Sandaru & Kaveesha</div>
        <div class="lux-date">05 November 2026</div>

        <button class="lux-scroll-btn" onclick="goToPage(0)">
            Go to Details
        </button>
    </div>
</section>

<!-- SLIDER -->
<div class="pages" id="pages">

    <!-- TIMER -->
    <section class="page">
        <h2>Save the Date</h2>

        <div class="timer">
            <div><span id="days">00</span></div>
            <div><span id="hours">00</span></div>
            <div><span id="minutes">00</span></div>
            <div><span id="seconds">00</span></div>
        </div>

        <button onclick="goToPage(1)">Next → Agenda</button>
    </section>

    <!-- AGENDA -->
    <section class="page">
        <h2>Wedding Agenda</h2>

        <div class="agenda-container">
            <div class="agenda-item"><span>08:00</span><span>Arrival</span></div>
            <div class="agenda-item"><span>09:00</span><span>Ceremony</span></div>
            <div class="agenda-item"><span>12:00</span><span>Lunch</span></div>
        </div>

        <button onclick="goToPage(0)">← Back</button>
    </section>

</div>

<script>

let pages = document.getElementById("pages");
let current = 0;

function goToPage(index){
    current = index;
    pages.style.transform = `translateX(-${index * 100}vw)`;
}

function openInvite(){
    document.getElementById("invite").scrollIntoView({behavior:"smooth"});
}

// timer
const wedding = new Date("November 5, 2026 00:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let gap = wedding - now;

    document.getElementById("days").innerText = Math.floor(gap/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((gap/(1000*60*60))%24);
    document.getElementById("minutes").innerText = Math.floor((gap/(1000*60))%60);
    document.getElementById("seconds").innerText = Math.floor((gap/1000)%60);
},1000);

</script>

</body>
</html>
