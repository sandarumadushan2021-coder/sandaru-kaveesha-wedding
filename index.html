<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body{
  margin:0;
  font-family:Georgia,serif;
  background:#fffdf7;
  text-align:center;
}

/* ENVELOPE SCREEN */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,#fff8dc,#ffffff);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.envelope{
  width:220px;
  height:160px;
  background:white;
  border-radius:15px;
  box-shadow:0 0 25px gold;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
  animation:pulse 1.2s infinite;
}

.envelope span{
  font-size:50px;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* MAIN CONTENT */
.hero{
  padding:80px 20px;
  background:linear-gradient(to bottom,#fff8dc,#ffffff);
}

h1{
  font-size:3rem;
  color:#c9a227;
}

.countdown{
  font-size:2rem;
  margin:30px;
  font-weight:bold;
  color:#c9a227;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(201,162,39,0.3);
  display:inline-block;
}

.section{
  padding:50px 20px;
}

.btn{
  display:inline-block;
  padding:15px 30px;
  margin:10px;
  background:#c9a227;
  color:white;
  text-decoration:none;
  border-radius:30px;
}

.photo{
  width:250px;
  height:250px;
  border-radius:50%;
  object-fit:cover;
  margin:20px;
}

/* hide main site first */
#main
