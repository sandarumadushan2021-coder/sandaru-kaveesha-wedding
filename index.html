<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandaru & Kaveesha Wedding</title>

<style>
body{
  margin:0;
  font-family:Georgia,serif;
  background:#fffdf7;
  color:#333;
  text-align:center;
}

/* HERO */
.hero{
  padding:80px 20px;
  background:linear-gradient(to bottom,#fff8dc,#ffffff);
}

h1{
  font-size:3rem;
  color:#c9a227;
}

/* COUNTDOWN */
.countdown{
  font-size:2rem;
  margin:30px;
  font-weight:bold;
  color:#c9a227;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(201,162,39,0.3);
  display:inline-block;
}

/* SECTIONS */
.section{
  padding:50px 20px;
}

.btn{
  display:inline-block;
  padding:15px 30px;
  margin:10px;
  background:#c9a227;
  color:white;
  text-decoration:none;
  border-radius:30px;
  font-size:18px;
}

/* PHOTOS */
.photo{
  width:250px;
  height:250px;
  border-radius:50%;
  object-fit:cover;
  margin:20px;
}

/* OVERLAY (ENVELOPE) */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.envelope{
  width:260px;
  height:200px;
  background:white;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 25px gold;
}

.icon{
  font-size:50px;
  background:gold;
  width:80px;
  height:80px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* MENU */
.menu{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:white;
  padding:30px;
  border-radius:20px 20px 0 0;
  box-shadow:0 -5px 20px rgba(0,0,0,0.3);
  transition:0.4s;
}

.menu.show{
  bottom:0;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Sandaru ❤️ Kaveesha</h1>
  <p>We are getting married</p>

  <div id="countdown" class="countdown"></div>

  <br><br>
  <a href="#" class="btn" onclick="openEnvelope()">Open Invitation 💌</a>
</section>

<!-- PHOTOS -->
<section class="section">
  <img class="photo" src="SAVE_20260322_144012.jpg">
  <img class="photo" src="SAVE_20260322_163358.jpg">
</section>

<!-- CEREMONY -->
<section class="section">
  <h2>Wedding Ceremony</h2>
  <p>05 November 2026</p>
  <p>11:00 AM</p>
  <p>Royal Dream Palace</p>

  <a class="btn" href="https://maps.app.goo.gl/s2BS64UK8cj58Ukt8" target="_blank">
    View Location
  </a>
</section>

<!-- RECEPTION -->
<section class="section">
  <h2>Going Away Reception</h2>
  <p>04:00 PM</p>
</section>

<!-- RSVP -->
<section class="section">
  <h2>RSVP</h2>
  <a class="btn" href="https://wa.me/94752452479" target="_blank">
    Confirm Attendance
  </a>
</section>

<!-- ENVELOPE POPUP -->
<div id="overlay" class="overlay" onclick="closeEnvelope()">
  <div class="envelope" onclick="event.stopPropagation()">
    <div class="icon" onclick="openMenu()">💍</div>
    <p>Tap icon to open menu</p>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <h2>Wedding Menu</h2>
  <p>💒 Ceremony</p>
  <p>📍 Location</p>
  <p>📸 Gallery</p>
  <p>💌 RSVP</p>
  <button onclick="closeMenu()">Close</button>
</div>

<script>
// COUNTDOWN
const weddingDate = new Date("Nov 05, 2026 11:00:00").getTime();

setInterval(function() {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "💍 Today is the day!";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
  `<div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
    <div><h2>${days}</h2><p>Days</p></div>
    <div><h2>${hours}</h2><p>Hours</p></div>
    <div><h2>${minutes}</h2><p>Minutes</p></div>
    <div><h2>${seconds}</h2><p>Seconds</p></div>
  </div>`;
}, 1000);

// ENVELOPE
function openEnvelope(){
  document.getElementById("overlay").style.display="flex";
}

function closeEnvelope(){
  document.getElementById("overlay").style.display="none";
}

// MENU
function openMenu(){
  document.getElementById("menu").classList.add("show");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("show");
}
</script>

</body>
</html>
