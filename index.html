<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{overflow:hidden;font-family:'Playfair Display',serif;}

section{
    display:none;
    height:100vh;
    width:100%;
    justify-content:center;
    align-items:center;
    text-align:center;
}

section.active{display:flex;}

/* HOME */
#home{
    flex-direction:column;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover;
    color:white;
    position:relative;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

#home > div{position:relative;z-index:2;}

h1{font-size:70px;position:relative;top:-60px;}

.names{
    font-family:'Great Vibes';
    font-size:90px;
    color:#C9A24E;
    display:flex;
    gap:15px;
    align-items:center;
}

.ring{width:80px;animation:float 3s infinite;}

.btn{
    margin-top:40px;
    padding:14px 40px;
    border:none;
    border-radius:40px;
    background:#C9A24E;
    color:#fff;
    cursor:pointer;
    animation:pulse 2s infinite;
}

/* INVITE */
#invite{
    flex-direction:column;
    background:#000;
    color:white;
}

.lux-title{font-size:30px;letter-spacing:6px;}
.lux-names{font-size:60px;color:#C9A24E;}
.lux-date{margin-top:15px;font-size:35px;}

.lux-btn{
    margin-top:40px;
    padding:12px 30px;
    background:#C9A24E;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* AGENDA */
#agenda{
    flex-direction:column;
    background:#111;
    color:#C9A24E;
    padding:20px;
}

.agenda-title{
    font-size:40px;
    margin-bottom:30px;
}

.agenda{
    color:white;
    line-height:2;
    font-size:20px;
}

/* TIMER */
#timer{
    flex-direction:column;
    background:#000;
    color:#C9A24E;
}

.boxes{
    display:flex;
    gap:15px;
}

.box{
    padding:15px;
    border:1px solid #C9A24E;
    min-width:80px;
}

.box span{font-size:30px;}

/* ANIMATIONS */
@keyframes float{50%{transform:translateY(-8px);}}
@keyframes pulse{70%{box-shadow:0 0 20px rgba(201,162,78,0.5);}}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="active">
    <div>
        <h1>The Wedding of</h1>

        <div class="names">
            Sandaru
            <img class="ring" src="ring.png">
            Kaveesha
        </div>

        <button class="btn" onclick="go('invite')">OPEN INVITATION</button>
    </div>
</section>

<!-- INVITE -->
<section id="invite">
    <div>
        <div class="lux-title">WE ARE GETTING MARRIED</div>
        <div class="lux-names">Sandaru & Kaveesha</div>
        <div class="lux-date">05 NOV 2026</div>

        <button class="lux-btn" onclick="go('agenda')">VIEW AGENDA</button>
    </div>
</section>

<!-- AGENDA -->
<section id="agenda">
    <div>
        <div class="agenda-title">AGENDA</div>

        <div class="agenda">
            4:00 PM – Welcome<br>
            5:00 PM – Ceremony<br>
            6:30 PM – Ring Exchange<br>
            7:30 PM – Dinner<br>
            8:30 PM – Celebration
        </div>

        <button class="lux-btn" onclick="go('timer')">SAVE THE DATE</button>
    </div>
</section>

<!-- TIMER -->
<section id="timer">
    <div>
        <h2>COUNTDOWN</h2>

        <div class="boxes">
            <div class="box"><span id="d">0</span><br>Days</div>
            <div class="box"><span id="h">0</span><br>Hours</div>
            <div class="box"><span id="m">0</span><br>Min</div>
            <div class="box"><span id="s">0</span><br>Sec</div>
        </div>
    </div>
</section>

<script>
function go(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* countdown */
const date = new Date("November 5, 2026").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let gap = date - now;

    document.getElementById("d").innerText = Math.floor(gap/86400000);
    document.getElementById("h").innerText = Math.floor(gap/3600000%24);
    document.getElementById("m").innerText = Math.floor(gap/60000%60);
    document.getElementById("s").innerText = Math.floor(gap/1000%60);
},1000);
</script>

</body>
</html>
