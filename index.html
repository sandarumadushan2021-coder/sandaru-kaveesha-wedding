<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandaru & Kaveesha Wedding</title>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.10.8/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  font-family:Georgia,serif;
  background:#0a0a0f;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* START SCREEN */
#startScreen{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#1a1a1a,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* 3D ENVELOPE WRAPPER */
.scene{
  perspective:1000px;
}

.envelope{
  width:260px;
  height:180px;
  position:relative;
  transform-style:preserve-3d;
  cursor:pointer;
}

/* FRONT BODY */
.front{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  border-radius:10px;
  box-shadow:0 0 30px gold;
}

/* FLAP (3D TOP) */
.flap{
  position:absolute;
  width:100%;
  height:50%;
  background:gold;
  top:0;
  transform-origin:top;
  transform:rotateX(0deg);
  transition:0.8s;
  border-radius:10px 10px 0 0;
}

/* OPEN STATE */
.envelope.open .flap{
  transform:rotateX(180deg);
}

/* ICON */
.icon{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
}

/* MAIN SITE */
#mainSite{
  display:none;
  background:radial-gradient(circle,#111,#000);
}

/* HERO */
.hero{
  padding:80px 20px;
}

h1{
  font-size:3rem;
  color:gold;
  text-shadow:0 0 20px gold;
}

.countdown{
  font-size:2rem;
  margin:20px;
  color:gold;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  display:inline-block;
}

/* BUTTON */
.btn{
  padding:15px 30px;
  background:gold;
  color:black;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  display:inline-block;
  margin:10px;
}

/* PHOTO */
.photo{
  width:200px;
  height:200px;
  border-radius:50%;
  border:3px solid gold;
  object-fit:cover;
  margin:10px;
}

/* FIREWORKS */
#fireworks{
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* MUSIC */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:gold;
  color:black;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="scene">
    <div class="envelope" id="envelope">
      <div class="flap"></div>
      <div class="front"></div>
      <div class="icon">💌</div>
    </div>
  </div>
</div>

<!-- FIREWORKS -->
<div id="fireworks"></div>

<!-- MAIN SITE -->
<div id="mainSite">

<div class="hero">
  <h1>Sandaru ❤️ Kaveesha</h1>
  <p>We are getting married</p>

  <div id="countdown" class="countdown"></div>
</div>

<div>
  <img class="photo" src="SAVE_20260322_144012.jpg">
  <img class="photo" src="SAVE_20260322_163358.jpg">
</div>

<div style="padding:40px">
  <h2>Wedding Ceremony</h2>
  <p>05 November 2026 - 11:00 AM</p>

  <a class="btn" href="https://maps.app.goo.gl/s2BS64UK8cj58Ukt8" target="_blank">
    View Location
  </a>
</div>

<div style="padding:30px">
  <h2>RSVP</h2>
  <a class="btn" href="https://wa.me/94752452479" target="_blank">
    Confirm Attendance
  </a>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3b6c2d0d3b.mp3">
</audio>

<div id="musicBtn">🎵</div>

<script>

let fireworks;

// OPEN ENVELOPE
document.getElementById("envelope").addEventListener("click", function(){

  this.classList.add("open");

  setTimeout(()=>{

    document.getElementById("startScreen").style.display="none";
    document.getElementById("mainSite").style.display="block";

    startCountdown();
    startFireworks();

    document.getElementById("music").play().catch(()=>{});

  },800);
});

// COUNTDOWN
function startCountdown(){
  const weddingDate = new Date("Nov 05, 2026 11:00:00").getTime();

  setInterval(()=>{
    const now = new Date().getTime();
    const d = weddingDate - now;

    const days = Math.floor(d/(1000*60*60*24));
    const hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    const mins = Math.floor((d%(1000*60*60))/(1000*60));
    const sec = Math.floor((d%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
    `${days} Days ${hours}h ${mins}m ${sec}s`;

  },1000);
}

// FIREWORKS
function startFireworks(){
  fireworks = new Fireworks.default(document.getElementById("fireworks"),{
    speed:3,
    particles:80,
    explosion:5
  });

  fireworks.start();

  setTimeout(()=>fireworks.stop(),8000);
}

// MUSIC TOGGLE
document.getElementById("musicBtn").onclick = ()=>{
  let m = document.getElementById("music");
  if(m.paused){ m.play(); }
  else{ m.pause(); }
};

</script>

</body>
</html>
