<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandaru & Kaveesha Wedding</title>

<!-- FIREWORK LIB -->
<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  font-family:"Georgia",serif;
  background:#0b0b0f;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* START SCREEN */
#startScreen{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#2a2a2a,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* ENVELOPE */
.envelope{
  width:260px;
  height:180px;
  background:#fff;
  border-radius:10px;
  position:relative;
  cursor:pointer;
  box-shadow:0 0 40px gold;
  animation:float 2s infinite ease-in-out;
  overflow:hidden;
}

/* FLAP (paper open effect) */
.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:50%;
  background:gold;
  transform-origin:top;
  transition:0.8s;
}

/* open animation */
.envelope.open:before{
  transform:rotateX(180deg);
}

/* ICON */
.envelope span{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:45px;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* MAIN SITE */
#mainSite{
  display:none;
  background:linear-gradient(to bottom,#111,#000);
}

/* HERO */
.hero{
  padding:80px 20px;
  background:radial-gradient(circle,#1c1c1c,#000);
}

h1{
  font-size:3rem;
  color:gold;
}

.countdown{
  font-size:2rem;
  margin:20px;
  color:gold;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  display:inline-block;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
}

/* SECTION */
.section{
  padding:50px 20px;
}

.btn{
  padding:15px 30px;
  background:gold;
  color:black;
  text-decoration:none;
  border-radius:30px;
  display:inline-block;
  margin:10px;
  font-weight:bold;
}

.photo{
  width:220px;
  height:220px;
  border-radius:50%;
  object-fit:cover;
  margin:10px;
  border:3px solid gold;
}

/* MUSIC BUTTON */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:gold;
  color:black;
  padding:12px 15px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="envelope" id="envelope">
    <span>💌</span>
  </div>
</div>

<!-- FIREWORK AREA -->
<div id="fireworks" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>

<!-- MAIN SITE -->
<div id="mainSite">

<div class="hero">
  <h1>Sandaru ❤️ Kaveesha</h1>
  <p>We are getting married</p>

  <div id="countdown" class="countdown"></div>
</div>

<div class="section">
  <img class="photo" src="SAVE_20260322_144012.jpg">
  <img class="photo" src="SAVE_20260322_163358.jpg">
</div>

<div class="section">
  <h2>Wedding Ceremony</h2>
  <p>05 November 2026 - 11:00 AM</p>

  <a class="btn" href="https://maps.app.goo.gl/URrSyKFRtLuPX3r97" target="_blank">
    View Location
  </a>
</div>

<div class="section">
  <h2>RSVP</h2>
  <a class="btn" href="https://wa.me/94752452479" target="_blank">
    Confirm Attendance
  </a>
</div>

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3b6c2d0d3b.mp3" type="audio/mpeg">
</audio>

<div id="musicBtn">🎵</div>

<script>

let fireworks;

// OPEN ENVELOPE
document.getElementById("envelope").addEventListener("click", function(){

  // paper open animation
  this.classList.add("open");

  // fireworks start
  setTimeout(()=>{
    document.getElementById("startScreen").style.display="none";
    document.getElementById("mainSite").style.display="block";

    startCountdown();
    startFireworks();

    // play music
    document.getElementById("bgMusic").play();

  },800);
});

// COUNTDOWN
function startCountdown(){
  const weddingDate = new Date("Nov 05, 2026 11:00:00").getTime();

  setInterval(function(){
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const d = Math.floor(distance/(1000*60*60*24));
    const h = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((distance%(1000*60*60))/(1000*60));
    const s = Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
    `${d} Days ${h}h ${m}m ${s}s`;

  },1000);
}

// FIREWORKS
function startFireworks(){
  fireworks = new Fireworks.default(document.getElementById('fireworks'), {
    speed:3,
    acceleration:1.05,
    friction:0.97,
    particles:80,
    trace:3,
    explosion:5
  });

  fireworks.start();

  setTimeout(()=>{
    fireworks.stop();
  },8000);
}

// MUSIC BUTTON
document.getElementById("musicBtn").addEventListener("click", function(){
  const music = document.getElementById("bgMusic");
  if(music.paused){
    music.play();
    this.innerHTML="🎵";
  }else{
    music.pause();
    this.innerHTML="🔇";
  }
});

</script>

</body>
</html>
