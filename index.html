<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===== YOUR EXISTING CSS (UNCHANGED) ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{overflow:hidden;}

section{
    display:none;
    height:100vh;
    width:100%;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

section.active{
    display:flex;
}

/* HOME */
#home{
    flex-direction:column;
    color:white;
    background:url('https://images.unsplash.com/photo-1529636798458-92182e662485?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}

#home::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

#home > div{position:relative;z-index:2;}

h1{
    font-family:'Playfair Display',serif;
    font-size:70px;
    color:#fff;
}

.names{
    font-family:'Great Vibes',cursive;
    font-size:90px;
    color:#C9A24E;
}

.btn{
    margin-top:40px;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:40px;
    background:linear-gradient(135deg,#C9A24E,#8C6B2F);
    color:white;
    cursor:pointer;
}

/* INVITE */
#invite{
    flex-direction:column;
    overflow:hidden;
    color:white;
    background:#000;
}

.lux-scroll-btn{
    margin-top:30px;
    padding:15px 40px;
    border-radius:30px;
    border:none;
    background:#C9A24E;
    cursor:pointer;
}

/* NEXT */
#nextPage{
    flex-direction:column;
    background:#111;
    color:#C9A24E;
}

/* ===== TRANSITIONS ===== */
.cloud-transition,
.gold-transition{
    position:fixed;
    inset:0;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

.cloud-transition.active,
.gold-transition.active{
    opacity:1;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="active">
    <div>
        <h1>The Wedding of</h1>

        <div class="names">
            Sandaru & Kaveesha
        </div>

        <button class="btn" onclick="openInvite()">
            OPEN INVITATION
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="khuda jaane.webm" type="audio/webm">
    </audio>
</section>

<!-- INVITE -->
<section id="invite">
    <div>
        <h2>We are getting married</h2>

        <h1>Sandaru & Kaveesha</h1>

        <button class="lux-scroll-btn" onclick="scrollToNext()">
            Scroll Down
        </button>
    </div>
</section>

<!-- NEXT -->
<section id="nextPage">
    <h1>SAVE THE DATE</h1>
    <p>05 November 2026</p>
</section>

<!-- TRANSITIONS -->
<div id="cloudTransition" class="cloud-transition"></div>
<div id="goldTransition" class="gold-transition"></div>

<script>

let pages = ["home", "invite", "nextPage"];
let currentIndex = 0;

/* ===== PAGE SWITCH ===== */
function switchPage(id){
    document.querySelectorAll("section").forEach(s=>{
        s.classList.remove("active");
        s.style.display = "none";
    });

    const el = document.getElementById(id);
    if(!el) return;

    el.classList.add("active");
    el.style.display = "flex";

    currentIndex = pages.indexOf(id);
}

/* sync helper */
function syncIndex(id){
    currentIndex = pages.indexOf(id);
}

/* ===== HOME → INVITE ===== */
function openInvite(){
    const music = document.getElementById("bgMusic");

    music.volume = 0.6;
    music.play().catch(()=>{});

    switchPage("invite");
}

/* ===== INVITE → NEXT ===== */
function scrollToNext(){
    switchPage("nextPage");
}

/* ===== NEXT / PREV ===== */
function goNext(){
    if(currentIndex < pages.length - 1){
        currentIndex++;
        switchPage(pages[currentIndex]);
    }
}

function goPrev(){
    if(currentIndex > 0){
        currentIndex--;
        switchPage(pages[currentIndex]);
    }
}

/* ===== SWIPE CONTROL ===== */
let startY = 0;

document.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
    let endY = e.changedTouches[0].clientY;
    let diff = startY - endY;

    if(diff > 80){
        goNext();
    }

    if(diff < -80){
        goPrev();
    }
});

/* PC scroll */
document.addEventListener("wheel", e=>{
    if(e.deltaY > 50){
        goNext();
    }

    if(e.deltaY < -50){
        goPrev();
    }
});

</script>

</body>
</html>
